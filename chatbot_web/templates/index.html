<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chatbot de Enervía</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 12px;
            background-color: #00b30f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #1a7121;
        }
        .respuesta {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chatbot de Enervía</h1>
        <form id="chat-form">
            <input type="text" id="query" placeholder="Escribe tu pregunta..." required>
            <button type="submit">Enviar</button>
        </form>
        <div id="respuesta" class="respuesta" style="display: none;"></div>
    </div>

    <script>
        document.getElementById("chat-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const query = document.getElementById("query").value;
            fetch("/preguntar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: new URLSearchParams({ "query": query })
            })
            .then(response => response.json())
            .then(data => {
                const respuestaDiv = document.getElementById("respuesta");
                respuestaDiv.style.display = "block";
                respuestaDiv.innerHTML = `<strong>Respuesta:</strong> ${data.respuesta}`;
            })
            .catch(error => console.error("Error:", error));
        });
    </script>
</body>
</html>
